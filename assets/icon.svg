  <!-- 줄번호 거터 구분선 -->
  <line x1="36" y1="30" x2="36" y2="98" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- 줄번호 점 -->
  <circle cx="26" cy="40" r="2" fill="#858585"/>
  <circle cx="26" cy="56" r="2" fill="#858585"/>
  <circle cx="26" cy="72" r="2" fill="#858585"/>
  <circle cx="26" cy="88" r="2" fill="#858585"/>
  <!-- 코드 줄 (구문강조 색) -->
  <g stroke-linecap="round" stroke-width="6">
    <line x1="44" y1="40" x2="64" y2="40" stroke="#569CD6"/>
    <line x1="70" y1="40" x2="92" y2="40" stroke="#4EC9B0"/>

    <line x1="50" y1="56" x2="66" y2="56" stroke="#9CDCFE"/>
