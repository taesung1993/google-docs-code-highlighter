    <line x1="50" y1="72" x2="78" y2="72" stroke="#DCDCAA"/>
    <line x1="84" y1="72" x2="96" y2="72" stroke="#B5CEA8"/>

    <line x1="44" y1="88" x2="58" y2="88" stroke="#C586C0"/>
    <line x1="64" y1="88" x2="88" y2="88" stroke="#D4D4D4"/>
  </g>
</svg>
