<svg width="220" height="140" viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect x="0" y="0" width="220" height="140" fill="#ffffff"/>
  <!-- 코드 박스 (VSCode 다크) -->
  <rect x="14" y="34" width="92" height="72" rx="10" fill="#1E1E1E"/>
  <!-- 줄번호 거터 구분선 -->
  <line x1="33" y1="41" x2="33" y2="99" stroke="#3a3a3a" stroke-width="1.3"/>
  <!-- 줄번호 점 -->
  <circle cx="24" cy="50" r="1.8" fill="#858585"/>
  <circle cx="24" cy="63" r="1.8" fill="#858585"/>
  <circle cx="24" cy="76" r="1.8" fill="#858585"/>
  <circle cx="24" cy="89" r="1.8" fill="#858585"/>
  <!-- 코드 줄 (구문강조 색) -->
  <g stroke-linecap="round" stroke-width="5">
    <line x1="41" y1="50" x2="59" y2="50" stroke="#569CD6"/>
    <line x1="65" y1="50" x2="85" y2="50" stroke="#4EC9B0"/>

    <line x1="46" y1="63" x2="61" y2="63" stroke="#9CDCFE"/>
    <line x1="67" y1="63" x2="92" y2="63" stroke="#CE9178"/>

    <line x1="46" y1="76" x2="72" y2="76" stroke="#DCDCAA"/>
    <line x1="78" y1="76" x2="89" y2="76" stroke="#B5CEA8"/>

    <line x1="41" y1="89" x2="54" y2="89" stroke="#C586C0"/>
    <line x1="60" y1="89" x2="84" y2="89" stroke="#D4D4D4"/>
  </g>
  <!-- 텍스트 -->
  <text x="118" y="64" font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="15" font-weight="700" fill="#202124">Code</text>
  <text x="118" y="83" font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="15" font-weight="700" fill="#202124">Highlighter</text>
  <text x="118" y="100" font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="10" font-weight="400" fill="#5f6368">for Docs</text>
</svg>
