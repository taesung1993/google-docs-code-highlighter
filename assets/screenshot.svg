<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <!-- 전체 배경 (Docs 회색 캔버스) -->
  <rect x="0" y="0" width="1280" height="800" fill="#f8f9fa"/>

  <!-- 상단 Docs 바 -->
  <rect x="0" y="0" width="1280" height="92" fill="#ffffff"/>
  <line x1="0" y1="92" x2="1280" y2="92" stroke="#e0e0e0" stroke-width="1"/>
  <!-- 문서 아이콘 -->
  <rect x="28" y="24" width="30" height="38" rx="3" fill="#4285F4"/>
  <rect x="34" y="34" width="18" height="2.5" fill="#ffffff"/>
  <rect x="34" y="40" width="18" height="2.5" fill="#ffffff"/>
  <rect x="34" y="46" width="12" height="2.5" fill="#ffffff"/>
  <!-- 문서 제목 -->
  <text x="72" y="38" font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="19" fill="#202124">Code Highlighter</text>
  <!-- 메뉴 줄 -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" fill="#444746">
    <text x="72" y="74">파일</text>
    <text x="116" y="74">수정</text>
    <text x="160" y="74">보기</text>
    <text x="204" y="74">삽입</text>
    <text x="248" y="74">서식</text>
    <text x="292" y="74">도구</text>
    <text x="336" y="74">확장 프로그램</text>
    <text x="430" y="74">도움말</text>
  </g>
  <!-- 애드온 메뉴 강조 -->
  <text x="496" y="74" font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a73e8">🎨 Code Highlighter</text>

  <!-- 문서 페이지 카드 -->
  <rect x="190" y="128" width="900" height="640" rx="2" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>

  <!-- 문서 제목 -->
  <text x="232" y="210" font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="30" font-weight="500" fill="#202124">Greeter.java</text>
  <text x="232" y="248" font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="15" fill="#5f6368">선택한 코드를 VSCode 다크 박스로 변환했습니다 · Converted with Code Highlighter</text>

  <!-- ===== 변환된 코드 박스 (VSCode Dark+) ===== -->
  <rect x="232" y="284" width="816" height="372" rx="10" fill="#1E1E1E"/>
  <!-- 줄번호 거터 구분선 -->
  <line x1="296" y1="300" x2="296" y2="640" stroke="#333333" stroke-width="1"/>

  <!-- 줄번호 (가운데/우측 정렬) -->
  <g font-family="'SF Mono', Menlo, Monaco, 'Courier New', monospace" font-size="16" fill="#858585" text-anchor="end">
    <text x="278" y="330">1</text>
    <text x="278" y="362">2</text>
    <text x="278" y="394">3</text>
    <text x="278" y="426">4</text>
    <text x="278" y="458">5</text>
    <text x="278" y="490">6</text>
    <text x="278" y="522">7</text>
    <text x="278" y="554">8</text>
    <text x="278" y="586">9</text>
    <text x="278" y="618">10</text>
  </g>

  <!-- 코드 (구문강조) -->
  <g font-family="'SF Mono', Menlo, Monaco, 'Courier New', monospace" font-size="16" xml:space="preserve">
    <!-- 1: public class Greeter { -->
    <text x="316" y="330"><tspan fill="#569CD6">public class </tspan><tspan fill="#4EC9B0">Greeter</tspan><tspan fill="#D4D4D4"> {</tspan></text>
    <!-- 2: public static void main(String[] args) { -->
    <text x="316" y="362"><tspan fill="#D4D4D4">    </tspan><tspan fill="#569CD6">public static void </tspan><tspan fill="#DCDCAA">main</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#4EC9B0">String</tspan><tspan fill="#D4D4D4">[] </tspan><tspan fill="#9CDCFE">args</tspan><tspan fill="#D4D4D4">) {</tspan></text>
    <!-- 3: String name = "윤태성"; -->
    <text x="316" y="394"><tspan fill="#D4D4D4">        </tspan><tspan fill="#4EC9B0">String</tspan><tspan fill="#9CDCFE"> name </tspan><tspan fill="#D4D4D4">= </tspan><tspan fill="#CE9178">"윤태성"</tspan><tspan fill="#D4D4D4">;</tspan></text>
    <!-- 4: int count = 3; -->
    <text x="316" y="426"><tspan fill="#D4D4D4">        </tspan><tspan fill="#569CD6">int</tspan><tspan fill="#9CDCFE"> count </tspan><tspan fill="#D4D4D4">= </tspan><tspan fill="#B5CEA8">3</tspan><tspan fill="#D4D4D4">;</tspan></text>
    <!-- 5: for (int i = 0; i < count; i++) { -->
    <text x="316" y="458"><tspan fill="#D4D4D4">        </tspan><tspan fill="#C586C0">for</tspan><tspan fill="#D4D4D4"> (</tspan><tspan fill="#569CD6">int</tspan><tspan fill="#9CDCFE"> i </tspan><tspan fill="#D4D4D4">= </tspan><tspan fill="#B5CEA8">0</tspan><tspan fill="#D4D4D4">; i &lt; count; i++) {</tspan></text>
    <!-- 6: System.out.println("안녕, " + name); -->
    <text x="316" y="490"><tspan fill="#D4D4D4">            </tspan><tspan fill="#4EC9B0">System</tspan><tspan fill="#D4D4D4">.</tspan><tspan fill="#9CDCFE">out</tspan><tspan fill="#D4D4D4">.</tspan><tspan fill="#DCDCAA">println</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#CE9178">"안녕, "</tspan><tspan fill="#D4D4D4"> + name);</tspan></text>
    <!-- 7: // 한 줄씩 인사를 출력 -->
    <text x="316" y="522"><tspan fill="#D4D4D4">        </tspan><tspan fill="#6A9955">// 한 줄씩 인사를 출력</tspan></text>
    <!-- 8: } -->
    <text x="316" y="554"><tspan fill="#D4D4D4">        }</tspan></text>
    <!-- 9: } -->
    <text x="316" y="586"><tspan fill="#D4D4D4">    }</tspan></text>
    <!-- 10: } -->
    <text x="316" y="618"><tspan fill="#D4D4D4">}</tspan></text>
  </g>
</svg>
