name: Deploy to Apps Script

# main에 push되면 자동으로 clasp push → Google Apps Script에 배포
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # Actions 탭에서 수동 실행도 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # clasp 로그인 토큰을 홈 디렉터리에 복원
      - name: Write clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"

      # .clasp.json은 저장소에 없으므로 scriptId로 재생성
      - name: Write .clasp.json
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: printf '{"scriptId":"%s","rootDir":""}' "$SCRIPT_ID" > .clasp.json

      - name: Push to Apps Script
        run: npx @google/clasp@3.3.0 push --force
